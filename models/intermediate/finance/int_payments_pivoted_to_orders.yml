version: 2

models:
  - name: int_payments_pivoted_to_orders
    description: Aggregates successful payment amounts to the order grain and pivots them into payment-method-specific columns.
    config:
      tags: ["intermediate", "finance"]
      meta:
        owner: "data"
        layer: "intermediate"
        domain: "finance"
        grain: "one row per order"
    columns:
      - name: order_id
        description: A unique identifier for each order.
        data_tests:
          - unique
          - not_null
      - name: bank_transfer_amount
        description: Total successful payment amount paid via bank transfer for the order.
      - name: credit_card_amount
        description: Total successful payment amount paid via credit card for the order.
      - name: coupon_amount
        description: Total successful payment amount paid using coupons for the order.
      - name: gift_card_amount
        description: Total successful payment amount paid using gift cards for the order.
      - name: total_amount
        description: Total successful payment amount for the order across all payment methods.
        data_tests:
          - not_null
