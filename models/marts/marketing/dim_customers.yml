models:
  - name: dim_customers
    description: >
      Comprehensive customer dimension with personal details, order history,
      behavioural segmentation, and retention signals.
    config:
      tags: ["mart", "marketing", "published"]
      meta:
        owner: "data"
        layer: "mart"
        domain: "marketing"
        grain: "one row per customer"
        primary_metric: "count_customer"
        contains_pii: true
    semantic_model:
      enabled: true
      group: marketing
      config:
        meta:
          owner: "data"
          domain: "marketing"
          semantic_role: "customers"
    agg_time_dimension: first_order_date
    columns:
      - name: customer_id
        description: A unique identifier for each customer.
        entity:
          type: primary
          name: customer
        data_tests:
          - unique
          - not_null
      - name: first_name
        description: The customer's first name.
      - name: last_name
        description: The customer's last name.
      - name: first_order_date
        description: The date when the customer placed their first order.
        granularity: day
        dimension:
          type: time
      - name: most_recent_order_date
        description: The date when the customer placed their most recent order.
        granularity: day
        dimension:
          type: time
      - name: customer_segment
        description: Behavioural segment based on order frequency (No Orders / New / Repeat / Loyal).
        dimension:
          type: categorical
      - name: number_of_orders
        description: The total number of orders placed by the customer.
      - name: lifetime_value
        description: The total revenue generated by the customer over their lifetime.
      - name: avg_days_between_orders
        description: >
          Average number of days between consecutive orders for this customer.
          Null for customers with only one order.
      - name: days_since_last_order
        description: >
          Number of days between the customer's most recent order and today.
          Useful for churn risk identification.
    derived_semantics:
      dimensions:
        - name: customer_value_tier
          type: categorical
          label: Customer Value Tier
          expr: |
            case
              when lifetime_value >= 150 then 'High Value'
              when lifetime_value >= 75 then 'Mid Value'
              else 'Low Value'
            end
    metrics:
      - name: number_of_orders
        description: The total number of orders placed across all customers.
        label: Number of Orders
        type: simple
        agg: sum
        expr: number_of_orders
      - name: lifetime_value
        description: The total revenue generated across all customers.
        label: Customer Lifetime Value
        type: simple
        agg: sum
        expr: lifetime_value
      - name: count_customer
        description: The total number of customers.
        label: Customer Count
        type: simple
        agg: count
        expr: customer_id
      - name: avg_order_gap
        description: Average number of days between repeat orders, across all customers.
        label: Avg Days Between Orders
        type: simple
        agg: average
        expr: avg_days_between_orders
