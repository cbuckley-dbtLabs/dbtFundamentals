models:
  - name: fct_orders
    description: >
      Comprehensive view of customer orders including order ID, customer ID,
      order date, status, total amount, gift card usage, and return flag.
      The central table for order trends, customer purchasing behaviour, and revenue analysis.
    config:
      tags: ["mart", "finance", "published"]
      meta:
        owner: "data"
        layer: "mart"
        domain: "finance"
        grain: "one row per order"
        primary_metric: "total_amount"
    semantic_model:
      enabled: true
      group: finance
      config:
        meta:
          owner: "data"
          domain: "finance"
          semantic_role: "orders"
    agg_time_dimension: order_date
    columns:
      - name: order_id
        description: A unique identifier for each order.
        entity:
          type: primary
          name: order
        data_tests:
          - unique
          - not_null
      - name: customer_id
        description: The unique identifier of the customer who placed the order.
        entity:
          type: foreign
          name: customer
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id
      - name: order_date
        description: The date on which the order was placed.
        granularity: day
        dimension:
          type: time
      - name: order_status
        description: The current status of the order (for example placed, shipped, completed, returned).
        dimension:
          type: categorical
      - name: amount
        description: The total monetary value of the order.
      - name: gift_card_amount
        description: The portion of the order amount paid using a gift card.
      - name: is_return
        description: Flag indicating whether the order was returned or is pending return (1 = yes, 0 = no).
        data_tests:
          - accepted_values:
              arguments:
                values: [0, 1]
    metrics:
      - name: total_amount
        description: The total monetary value of all orders.
        label: Total Order Amount
        type: simple
        agg: sum
        expr: amount
      - name: gift_card_amount
        description: The total order amount paid using gift cards.
        label: Gift Card Amount
        type: simple
        agg: sum
        expr: gift_card_amount
      - name: count_order
        description: The total number of orders placed.
        label: Order Count
        type: simple
        agg: count
        expr: order_id
      - name: count_ordering_customer
        description: The distinct number of customers with at least one order in the filtered slice.
        label: Ordering Customer Count
        type: simple
        agg: count_distinct
        expr: customer_id
      - name: return_count
        description: The number of orders that were returned or are pending return.
        label: Return Count
        type: simple
        agg: sum
        expr: is_return
      - name: avg_order_value
        description: The average revenue per order.
        label: Average Order Value
        type: ratio
        numerator: total_amount
        denominator: count_order
      - name: revenue_per_customer
        description: Average revenue per ordering customer in the filtered slice.
        label: Revenue per Ordering Customer
        type: ratio
        numerator: total_amount
        denominator: count_ordering_customer
      - name: orders_per_customer
        description: Average number of orders per ordering customer in the filtered slice.
        label: Orders per Ordering Customer
        type: ratio
        numerator: count_order
        denominator: count_ordering_customer
      - name: gift_card_rate
        description: The share of revenue paid using gift cards.
        label: Gift Card Rate
        type: ratio
        numerator: gift_card_amount
        denominator: total_amount
      - name: return_rate
        description: The proportion of orders that were returned or are pending return.
        label: Return Rate
        type: ratio
        numerator: return_count
        denominator: count_order
      - name: cumulative_revenue
        description: Running total of order revenue from the start of each month.
        label: Cumulative Revenue (MTD)
        type: cumulative
        input_metric: total_amount
        grain_to_date: month
