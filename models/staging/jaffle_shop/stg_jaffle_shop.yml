version: 2

models:
  - name: stg_jaffle_shop__customers
    description: Staged customer data from the jaffle shop application, renamed to analytics-friendly field names at one row per customer.
    config:
      tags: ["staging", "jaffle_shop", "core"]
      meta:
        owner: "data"
        layer: "staging"
        domain: "core"
        contains_pii: true
    columns:
      - name: customer_id
        description: The primary key for customers.
        data_tests:
          - unique
          - not_null
      - name: first_name
        description: The customer's first name.
      - name: last_name
        description: The customer's last name.

  - name: stg_jaffle_shop__orders
    description: Staged order records from the jaffle shop application, standardized to one row per order.
    config:
      tags: ["staging", "jaffle_shop", "core"]
      meta:
        owner: "data"
        layer: "staging"
        domain: "core"
        grain: "one row per order"
    columns:
      - name: order_id
        description: Primary key for orders.
        data_tests:
          - unique
          - not_null
      - name: status
        description: Lifecycle status for the order in the source application.
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - completed
                  - shipped
                  - returned
                  - placed
                  - return_pending
      - name: customer_id
        description: Foreign key to `stg_jaffle_shop__customers.customer_id`.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_jaffle_shop__customers')
                field: customer_id
      - name: order_date
        description: Date the order was created in the source application.
        data_tests:
          - not_null
